services:
  - type: web
    name: agile-flow-starter
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    previewsEnabled: true
    envVars:
      - key: SENTRY_DSN
        sync: false
      - key: NODE_VERSION
        value: "20"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPOSITORY
        sync: false
