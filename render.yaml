services:
  - type: web
    name: agile-flow-starter
    runtime: node
    plan: free
    # WARNING: Do not use standalone mode (node .next/standalone/server.js) —
    # static file copying is unreliable on Render, causing CSS/JS 404s.
    # Use `npm start` (next start) which handles static files natively.
    # See docs/PATTERN-LIBRARY.md #9
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    previewsEnabled: true
    envVars:
      - key: SENTRY_DSN
        sync: false
      - key: NODE_VERSION
        value: "20"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPOSITORY
        sync: false
