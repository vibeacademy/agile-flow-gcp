name: Deploy to Production

on:
  push:
    branches: [main]

# Required for Workload Identity Federation (keyless auth to GCP).
# If you are using a service account key instead (workshop shortcut),
# you can remove the id-token permission but keep contents: read.
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    # Don't run on the upstream template repo itself — only on forks that
    # have configured their own GCP project.
    if: github.repository != 'vibeacademy/agile-flow-gcp'

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'agile-flow' }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || 'agile-flow-app' }}

    steps:
      - name: Check for required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "GCP_PROJECT_ID not configured — skipping deployment."
            echo "See docs/PLATFORM-GUIDE.md for setup instructions."
          elif [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Neither GCP_WORKLOAD_IDENTITY_PROVIDER nor GCP_SA_KEY configured — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      # Authenticate to GCP. Prefers Workload Identity Federation (keyless).
      # Falls back to a service account JSON key if GCP_SA_KEY is set —
      # this is the workshop shortcut and is NOT recommended for production.
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: steps.check_secrets.outputs.skip != 'true' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: steps.check_secrets.outputs.skip != 'true' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && secrets.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: steps.check_secrets.outputs.skip != 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.check_secrets.outputs.skip != 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push container
        if: steps.check_secrets.outputs.skip != 'true'
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          # NEXT_PUBLIC_* vars must be passed as --build-arg (baked into the
          # client bundle at build time). Add more --build-arg lines as needed.
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL="${{ vars.NEXT_PUBLIC_APP_URL }}" \
            -t "$IMAGE" \
            .

          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        if: steps.check_secrets.outputs.skip != 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.build.outputs.image }}
          # Runtime env vars (NOT NEXT_PUBLIC_*, those were baked in at build time).
          # Map secrets to env vars via `--set-secrets` below for sensitive values.
          flags: |
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
          # Mount secrets from Secret Manager as env vars. Each secret must
          # exist in Secret Manager in the same project. DATABASE_URL points
          # at the production Neon branch.
          secrets: |
            DATABASE_URL=database-url:latest

      - name: Show deployed URL
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          echo "Deployed to: $URL"
          echo "## Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
